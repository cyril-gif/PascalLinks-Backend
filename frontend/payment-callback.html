<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Processing - DataHub</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .callback-container { max-width: 500px; margin: 3rem auto; padding: 2rem; background: #fff; border-radius: 16px; box-shadow: var(--shadow); text-align: center; }
    .spinner { width: 50px; height: 50px; border: 6px solid #e9ecef; border-top: 6px solid var(--gold); border-radius: 50%; margin: 1.5rem auto; animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-icon { font-size: 3rem; margin: 0.5rem 0; }
    .success { color: #28a745; }
    .error { color: #dc3545; }
    .message { font-size: 1.1rem; margin: 0.5rem 0 1rem; }
    .btn-primary { display: inline-block; background: var(--gold); color: var(--primary); padding: 0.7rem 2rem; border-radius: 30px; text-decoration: none; font-weight: bold; margin-top: 1rem; }
    .btn-primary:hover { background: var(--gold-light); }
  </style>
</head>
<body>
  <div class="callback-container" id="callbackContainer">
    <h2>Payment Processing</h2>
    <div class="spinner" id="loadingSpinner"></div>
    <div id="statusMessage">
      <p>Please wait while we confirm your payment...</p>
    </div>
  </div>

  <script>
    const API_BASE = 'https://pascallinks-frontend.onrender.com/api';

    (async function() {
      const container = document.getElementById('callbackContainer');
      const spinner = document.getElementById('loadingSpinner');
      const messageEl = document.getElementById('statusMessage');

      const urlParams = new URLSearchParams(window.location.search);
      const reference = urlParams.get('reference');
      const trxref = urlParams.get('trxref');
      const ref = reference || trxref;

      if (!ref) {
        spinner.style.display = 'none';
        messageEl.innerHTML = `
          <div class="status-icon error">❌</div>
          <p class="message">No payment reference found.</p>
          <a href="index.html" class="btn-primary">Return to Home</a>
        `;
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/orders/confirm`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ reference: ref }),
        });

        const data = await response.json();

        if (response.ok && data.success) {
          spinner.style.display = 'none';
          messageEl.innerHTML = `
            <div class="status-icon success">✅</div>
            <p class="message">Payment successful! Your order is being processed.</p>
            <p>Redirecting to your order status...</p>
          `;
          setTimeout(() => {
            window.location.href = `order-status.html?orderId=${data.orderId}`;
          }, 2000);
        } else {
          spinner.style.display = 'none';
          messageEl.innerHTML = `
            <div class="status-icon error">❌</div>
            <p class="message">Payment verification failed: ${data.error || 'Unknown error'}</p>
            <a href="index.html" class="btn-primary">Try Again</a>
          `;
        }
      } catch (error) {
        console.error('Callback error:', error);
        spinner.style.display = 'none';
        messageEl.innerHTML = `
          <div class="status-icon error">❌</div>
          <p class="message">We could not verify your payment at this time.</p>
          <p>Please check your email for confirmation or contact support.</p>
          <a href="index.html" class="btn-primary">Return to Home</a>
        `;
      }
    })();
  </script>
</body>
</html>
