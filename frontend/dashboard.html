<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Dashboard – PascalLinks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ===== DASHBOARD – ULTRA COMPACT ===== */
    .dashboard-body {
      background: #f4f6fa;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
    }
    /* Header */
    .dashboard-header {
      background: var(--primary);
      color: #fff;
      padding: 0.4rem 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    .dashboard-header .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .dashboard-header .logo {
      font-size: 1.1rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .dashboard-header .logo span { color: var(--gold); }
    .user-area {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: var(--primary);
      font-size: 0.8rem;
    }
    .user-name {
      font-weight: 600;
      font-size: 0.8rem;
    }
    .logout-btn {
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 0.15rem 0.8rem;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.65rem;
      transition: all 0.2s;
    }
    .logout-btn:hover {
      background: var(--gold);
      color: var(--primary);
    }

    /* ===== STATS – ULTRA COMPACT ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.6rem;
      margin: 0.8rem 0 1rem;
    }
    .stat-card {
      background: #fff;
      border-radius: 10px;
      padding: 0.5rem 0.3rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      border-left: 3px solid var(--gold);
      text-align: center;
      transition: transform 0.2s;
    }
    .stat-card:hover { transform: translateY(-1px); }
    .stat-card:nth-child(2) { border-left-color: #20c997; }
    .stat-card:nth-child(3) { border-left-color: #ffc107; }
    .stat-card:nth-child(4) { border-left-color: #17a2b8; }
    .stat-card .stat-label {
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: #6c757d;
      font-weight: 600;
    }
    .stat-card .stat-number {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--primary);
      line-height: 1.2;
    }
    .stat-card .stat-sub {
      font-size: 0.5rem;
      color: #adb5bd;
    }

    /* ===== ORDERS SECTION – COMPACT ===== */
    .orders-section {
      background: #fff;
      border-radius: 12px;
      padding: 0.8rem 0.8rem 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .orders-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-bottom: 0.5rem;
    }
    .orders-header h2 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--primary);
      margin: 0;
    }
    .orders-header h2 span { color: var(--gold); }
    .filter-group {
      display: flex;
      gap: 0.3rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-group input,
    .filter-group select {
      padding: 0.2rem 0.5rem;
      border: 1px solid #ced4da;
      border-radius: 6px;
      font-size: 0.65rem;
      background: #fff;
      height: 28px;
    }
    .filter-group input:focus,
    .filter-group select:focus {
      border-color: var(--gold);
      outline: none;
    }
    .filter-group button {
      background: var(--gold);
      border: none;
      padding: 0.2rem 0.8rem;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.65rem;
      color: var(--primary);
      cursor: pointer;
      height: 28px;
      transition: background 0.2s;
    }
    .filter-group button:hover { background: var(--gold-light); }

    /* ===== TABLE – TINY & TIGHT ===== */
    .order-table-wrapper {
      overflow-x: auto;
      margin-top: 0.3rem;
    }
    .order-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.7rem;
    }
    .order-table th {
      text-align: left;
      padding: 0.3rem 0.2rem;
      background: #f8f9fa;
      color: #495057;
      font-weight: 600;
      border-bottom: 2px solid #e9ecef;
      white-space: nowrap;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .order-table td {
      padding: 0.3rem 0.2rem;
      border-bottom: 1px solid #f1f3f5;
      color: #212529;
      font-size: 0.7rem;
    }
    .order-table tr:hover td { background: #f8f9fa; }
    .status-badge {
      padding: 0.1rem 0.4rem;
      border-radius: 30px;
      font-size: 0.55rem;
      font-weight: 600;
      display: inline-block;
      text-transform: capitalize;
      white-space: nowrap;
    }
    .status-pending_payment { background: #fff3cd; color: #856404; }
    .status-processing { background: #cce5ff; color: #004085; }
    .status-completed { background: #d4edda; color: #155724; }
    .status-failed { background: #f8d7da; color: #721c24; }
    .status-payment_failed { background: #f8d7da; color: #721c24; }
    .status-retrying { background: #e2e3e5; color: #383d41; }

    .no-orders {
      text-align: center;
      padding: 1rem;
      color: #6c757d;
      font-size: 0.8rem;
    }
    .no-orders a { color: var(--gold); font-weight: 600; }
    .loading-spinner {
      text-align: center;
      padding: 1rem;
      color: var(--primary);
      font-weight: 500;
      font-size: 0.8rem;
    }

    /* ===== FOOTER – MINIMAL ===== */
    .dashboard-footer {
      background: var(--primary);
      color: #fff;
      padding: 0.4rem 0;
      text-align: center;
      font-size: 0.55rem;
      opacity: 0.5;
      margin-top: 1rem;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .stats-grid { gap: 0.4rem; }
      .stat-card .stat-number { font-size: 1rem; }
      .stat-card { padding: 0.4rem 0.2rem; }
      .stat-card .stat-label { font-size: 0.5rem; }
      .orders-header { flex-direction: column; align-items: stretch; }
      .filter-group { justify-content: stretch; }
      .filter-group input,
      .filter-group select { flex: 1; min-width: 60px; font-size: 0.6rem; height: 26px; }
      .filter-group button { font-size: 0.6rem; height: 26px; }
      .order-table th,
      .order-table td { padding: 0.2rem 0.1rem; font-size: 0.6rem; }
      .status-badge { font-size: 0.5rem; padding: 0.05rem 0.3rem; }
      .orders-section { padding: 0.5rem; }
    }
    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr 1fr; gap: 0.3rem; }
      .stat-card .stat-number { font-size: 0.9rem; }
      .stat-card .stat-label { font-size: 0.45rem; }
      .dashboard-header .logo { font-size: 0.9rem; }
      .user-name { display: none; }
      .user-avatar { width: 24px; height: 24px; font-size: 0.7rem; }
      .order-table th,
      .order-table td { font-size: 0.5rem; padding: 0.15rem 0.05rem; }
      .order-table th { font-size: 0.5rem; }
      .status-badge { font-size: 0.45rem; padding: 0.05rem 0.2rem; }
      .orders-header h2 { font-size: 0.85rem; }
      .filter-group input,
      .filter-group select { font-size: 0.55rem; height: 22px; padding: 0.1rem 0.3rem; }
      .filter-group button { font-size: 0.55rem; height: 22px; padding: 0.1rem 0.5rem; }
    }
  </style>
</head>
<body class="dashboard-body">

  <!-- ===== HEADER – COMPACT ===== -->
  <header class="dashboard-header">
    <div class="container">
      <a href="index.html" class="logo">📶 Pascal<span>Links</span></a>
      <div class="user-area">
        <span class="user-avatar" id="userAvatar">U</span>
        <span class="user-name" id="userName">User</span>
        <button class="logout-btn" id="logoutBtn">Logout</button>
      </div>
    </div>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="container" style="padding: 0 0.8rem 1rem;">

    <!-- Stats Cards -->
    <div class="stats-grid" id="statsContainer">
      <div class="stat-card">
        <div class="stat-label">Total Orders</div>
        <div class="stat-number" id="totalOrders">0</div>
        <div class="stat-sub">All time</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Spent</div>
        <div class="stat-number" id="totalSpent">GHS 0</div>
        <div class="stat-sub">All time</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending</div>
        <div class="stat-number" id="pendingOrders">0</div>
        <div class="stat-sub">Processing</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Completed</div>
        <div class="stat-number" id="completedOrders">0</div>
        <div class="stat-sub">Delivered</div>
      </div>
    </div>

    <!-- Orders Section -->
    <div class="orders-section">
      <div class="orders-header">
        <h2>📋 Order <span>History</span></h2>
        <div class="filter-group">
          <input type="text" id="searchInput" placeholder="Search phone..." />
          <select id="statusFilter">
            <option value="">All</option>
            <option value="pending_payment">Pending</option>
            <option value="processing">Processing</option>
            <option value="completed">Completed</option>
            <option value="failed">Failed</option>
          </select>
          <button id="applyFilterBtn">Apply</button>
        </div>
      </div>
      <div id="ordersContainer">
        <div class="loading-spinner">Loading your orders...</div>
      </div>
    </div>
  </main>

  <!-- ===== FOOTER – MINIMAL ===== -->
  <footer class="dashboard-footer">
    <div class="container">&copy; 2026 PascalLinks. All rights reserved.</div>
  </footer>

  <script>
    // ===== DASHBOARD LOGIC =====
    const API_BASE = 'https://pascallinks-frontend.onrender.com/api';

    document.addEventListener('DOMContentLoaded', async () => {
      const token = localStorage.getItem('token');
      if (!token) {
        window.location.href = 'login.html';
        return;
      }

      const userNameEl = document.getElementById('userName');
      const userAvatarEl = document.getElementById('userAvatar');
      const ordersContainer = document.getElementById('ordersContainer');
      const totalOrdersEl = document.getElementById('totalOrders');
      const totalSpentEl = document.getElementById('totalSpent');
      const pendingOrdersEl = document.getElementById('pendingOrders');
      const completedOrdersEl = document.getElementById('completedOrders');
      const searchInput = document.getElementById('searchInput');
      const statusFilter = document.getElementById('statusFilter');
      const applyFilterBtn = document.getElementById('applyFilterBtn');

      let allOrders = [];

      // Fetch user profile
      try {
        const profileRes = await fetch(`${API_BASE}/auth/profile`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        if (!profileRes.ok) throw new Error('Session expired');
        const profileData = await profileRes.json();
        const user = profileData.user;
        userNameEl.textContent = user.fullName;
        userAvatarEl.textContent = user.fullName.charAt(0).toUpperCase();
      } catch (err) {
        localStorage.removeItem('token');
        window.location.href = 'login.html';
        return;
      }

      // Fetch orders
      async function loadOrders() {
        try {
          const res = await fetch(`${API_BASE}/orders`, {
            headers: { Authorization: `Bearer ${token}` }
          });
          if (!res.ok) throw new Error('Failed to fetch orders');
          allOrders = await res.json();
          renderOrders(allOrders);
          updateStats(allOrders);
        } catch (err) {
          ordersContainer.innerHTML = `<p class="no-orders">⚠️ ${err.message}</p>`;
        }
      }

      // Render filtered orders
      function renderOrders(orders) {
        const search = searchInput.value.trim().toLowerCase();
        const status = statusFilter.value;
        let filtered = orders;
        if (search) filtered = filtered.filter(o => o.beneficiary.includes(search));
        if (status) filtered = filtered.filter(o => o.status === status);

        if (filtered.length === 0) {
          ordersContainer.innerHTML = `
            <div class="no-orders">
              <p>No orders found.</p>
              <a href="index.html">Buy data now</a>
            </div>
          `;
          return;
        }

        let html = `<div class="order-table-wrapper"><table class="order-table"><thead><tr>
          <th>Date</th><th>Network</th><th>Plan</th><th>Beneficiary</th><th>Amount</th><th>Status</th>
        </tr></thead><tbody>`;
        filtered.forEach(order => {
          const date = new Date(order.createdAt).toLocaleDateString('en-GH', {
            day: '2-digit', month: 'short', year: 'numeric'
          });
          const statusClass = `status-${order.status}`;
          html += `<tr>
            <td>${date}</td>
            <td>${order.network.toUpperCase()}</td>
            <td>${order.package_size}</td>
            <td>${order.beneficiary}</td>
            <td>${order.sellingPrice.toFixed(2)}</td>
            <td><span class="status-badge ${statusClass}">${order.status.replace('_', ' ')}</span></td>
          </tr>`;
        });
        html += '</tbody></table></div>';
        ordersContainer.innerHTML = html;
      }

      // Update stats
      function updateStats(orders) {
        const total = orders.length;
        const spent = orders.reduce((sum, o) => sum + (o.sellingPrice || 0), 0);
        const pending = orders.filter(o => o.status === 'pending_payment' || o.status === 'processing').length;
        const completed = orders.filter(o => o.status === 'completed').length;

        totalOrdersEl.textContent = total;
        totalSpentEl.textContent = `GHS ${spent.toFixed(0)}`;
        pendingOrdersEl.textContent = pending;
        completedOrdersEl.textContent = completed;
      }

      // Events
      applyFilterBtn.addEventListener('click', () => renderOrders(allOrders));
      searchInput.addEventListener('keyup', (e) => {
        if (e.key === 'Enter') renderOrders(allOrders);
      });
      document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('token');
        window.location.href = 'index.html';
      });

      await loadOrders();
    });
  </script>
</body>
</html>
