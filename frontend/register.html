<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - DataHub</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .auth-container { max-width: 400px; margin: 3rem auto; padding: 2rem; background: #fff; border-radius: 16px; box-shadow: var(--shadow); }
    .auth-container h2 { text-align: center; color: var(--primary); margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 0.3rem; }
    .form-group input { width: 100%; padding: 0.7rem; border: 1px solid #ced4da; border-radius: 8px; font-size: 1rem; }
    .btn-primary { width: 100%; background: var(--gold); color: var(--primary); border: none; padding: 0.8rem; border-radius: 30px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 0.5rem; }
    .btn-primary:hover { background: var(--gold-light); }
    .auth-footer { text-align: center; margin-top: 1rem; }
    .auth-footer a { color: var(--gold); font-weight: 600; }
    .error-msg { color: #dc3545; font-size: 0.9rem; margin-top: 0.3rem; display: none; }
    .success-msg { color: #28a745; font-size: 0.9rem; margin-top: 0.3rem; display: none; }
  </style>
</head>
<body>
  <div class="auth-container">
    <h2>📶 Create Account</h2>
    <form id="registerForm">
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" placeholder="e.g., John Doe" required />
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="phone">Phone Number (Optional)</label>
        <input type="tel" id="phone" placeholder="0241234567" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min 6 characters" required minlength="6" />
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Re-enter password" required />
      </div>
      <div id="errorMsg" class="error-msg"></div>
      <div id="successMsg" class="success-msg"></div>
      <button type="submit" class="btn-primary">Register</button>
    </form>
    <div class="auth-footer">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>

  <script>
    // 👇 Backend base URL
    const API_BASE = 'https://pascallinks-frontend.onrender.com/api';

    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');

      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      if (!fullName || !email || !password) {
        errorMsg.textContent = 'Please fill in all required fields.';
        errorMsg.style.display = 'block';
        return;
      }
      if (password.length < 6) {
        errorMsg.textContent = 'Password must be at least 6 characters.';
        errorMsg.style.display = 'block';
        return;
      }
      if (password !== confirmPassword) {
        errorMsg.textContent = 'Passwords do not match.';
        errorMsg.style.display = 'block';
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fullName, email, phone, password })
        });
        const data = await response.json();

        if (response.ok) {
          successMsg.textContent = 'Registration successful! Redirecting to login...';
          successMsg.style.display = 'block';
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 1500);
        } else {
          errorMsg.textContent = data.error || 'Registration failed. Please try again.';
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.textContent = 'Network error. Please try again.';
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
